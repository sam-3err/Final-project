<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager - Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <div class="auth-container">
      <h2 id="formTitle">Login to Task Manager</h2>
      
      <form id="authForm">
        <input type="hidden" id="mode" value="login">
        
        <div id="registerFields" class="hidden">
          <div class="form-group">
            <label>Name</label>
            <input type="text" id="name" placeholder="John Doe">
          </div>
          <div class="form-group">
            <label>Role</label>
            <select id="role">
              <option value="USER">User (Team Member)</option>
              <option value="MANAGER">Project Manager</option>
              <option value="ADMIN">Admin</option>
            </select>
          </div>
        </div>
        
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="user@example.com" required>
        </div>
        
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter password" required>
        </div>
        
        <button type="submit" class="btn" id="submitBtn">Login</button>
      </form>
      
      <div style="text-align: center; margin-top: 20px;">
        <span id="toggleText" class="toggle-link" onclick="toggleAuthMode()">Need an account? Register</span>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
